        <div class="box2">THINGS ARE SUBJECT TO CHANGE. THIS ISN'T THE FINAL VERSION
            <br> feedback is welcome! (i'm not a writer)
        </div>
        <pre id="text-container" class="textc">loading text...</pre>
        <script>
            
            function fixSize() {
                var container = document.getElementById('text-container')
                var width = parseInt(container.offsetWidth)
                console.log(container.style.width)
                if (width > window.innerWidth * 0.8) {
                    container.style.width = window.innerWidth * 0.8 + 'px'
                    console.log(container.style.width)
                }
            }
            
            fixSize()

            fetch('ch.txt')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.text();
                })
                .then(data => {
                    document.getElementById('text-container').textContent = data;
                })
                .catch(error => {
                    console.error('Error fetching the text file:', error);
                    document.getElementById('text-container').textContent = 'Failed to load content.';
                });

            fixSize()

            window.addEventListener("resize",function() {
                fixSize()
            })
        </script>
    </body>
